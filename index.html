<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>FILM | 胶片相机</title>
<style>
/* ============================================================
   CSS Custom Properties & Design Tokens
   ============================================================ */
:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --leather: #1a1814;
  --brass: #b8935a;
  --brass-light: #d4b87a;
  --brass-dark: #8b6a3d;
  --chrome: #c0c0c0;
  --chrome-dark: #555;
  --red-accent: #c41e3a;
  --amber: #e8a840;
  --text-primary: #e0d8cc;
  --text-secondary: #8a8578;
  --text-dim: #4a4540;
  --font-mono: 'Courier Prime', 'Courier New', monospace;
  --font-display: 'DM Serif Display', 'Georgia', serif;
  --safe-bottom: env(safe-area-inset-bottom, 16px);
  --control-bg: rgba(20, 18, 14, 0.65);
  --control-border: rgba(184, 147, 90, 0.15);
  --blur-amount: 12px;
  --transition-speed: 0.3s;
}

/* ============================================================
   Fonts
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=DM+Serif+Display:ital@0;1&display=swap');

/* ============================================================
   Reset & Base
   ============================================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: var(--font-mono);
  color: var(--text-primary);
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
  touch-action: manipulation;
}

/* ============================================================
   Viewfinder — Full Screen Canvas Layer
   ============================================================ */
.viewfinder {
  position: fixed;
  inset: 0;
  z-index: 1;
}

.viewfinder canvas {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Viewfinder border — subtle darkroom frame */
.viewfinder::after {
  content: '';
  position: absolute;
  inset: 0;
  border: 2px solid rgba(0,0,0,0.5);
  box-shadow: inset 0 0 120px rgba(0,0,0,0.6);
  pointer-events: none;
  z-index: 5;
}

/* Viewfinder info text */
.viewfinder-info {
  position: absolute;
  top: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  color: var(--amber);
  text-shadow: 0 0 8px rgba(232,168,64,0.4);
  pointer-events: none;
  opacity: 0.8;
  display: flex;
  align-items: center;
  gap: 8px;
}
.viewfinder-info .dot {
  width: 4px; height: 4px;
  background: var(--red-accent);
  border-radius: 50%;
  animation: record-dot 2s ease-in-out infinite;
}
@keyframes record-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ============================================================
   Film Effect Overlays
   ============================================================ */
.fx-overlay {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 3;
  opacity: 0;
  transition: opacity 0.3s;
}
.fx-overlay.active { opacity: 1; }

/* Scan lines */
.fx-scanlines {
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
}

/* Dust particles (subtle, randomly placed via JS) */
.fx-dust {
  background-image: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.03) 0.5px, transparent 0.5px),
                    radial-gradient(circle at 70% 60%, rgba(255,255,255,0.02) 0.3px, transparent 0.3px),
                    radial-gradient(circle at 45% 80%, rgba(255,255,255,0.04) 0.4px, transparent 0.4px),
                    radial-gradient(circle at 85% 15%, rgba(255,255,255,0.02) 0.6px, transparent 0.6px);
}

/* Light leak overlay */
.fx-lightleak {
  background: linear-gradient(135deg,
    rgba(255,180,50,0.06) 0%,
    transparent 30%,
    rgba(255,80,20,0.03) 60%,
    transparent 100%);
}

/* ============================================================
   Flash Overlay (capture flash)
   ============================================================ */
.flash-overlay {
  position: fixed;
  inset: 0;
  background: #fff;
  z-index: 20;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.05s ease-out;
}
.flash-overlay.fire {
  opacity: 0.9;
  transition: opacity 0s;
}

/* ============================================================
   Film Advance Animation
   ============================================================ */
.film-advance {
  position: fixed;
  inset: 0;
  z-index: 15;
  pointer-events: none;
  opacity: 0;
  display: flex;
  flex-direction: column;
}
.film-advance.running {
  opacity: 1;
}
.film-advance .stripe {
  flex: 1;
  background: var(--bg);
  transform: translateX(-100%);
}
.film-advance.running .stripe {
  animation: film-stripe-slide 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}
@keyframes film-stripe-slide {
  0%   { transform: translateX(-100%); }
  60%  { transform: translateX(0%); }
  100% { transform: translateX(100%); }
}

/* ============================================================
   Timer Countdown Overlay
   ============================================================ */
.timer-overlay {
  position: fixed;
  inset: 0;
  z-index: 18;
  pointer-events: none;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.2s;
}
.timer-overlay.active {
  opacity: 1;
}
.timer-count {
  font-family: var(--font-display);
  font-size: 120px;
  color: var(--amber);
  text-shadow: 0 0 60px rgba(232,168,64,0.6), 0 0 120px rgba(232,168,64,0.3);
  animation: timer-pulse 1s ease-out infinite;
}
@keyframes timer-pulse {
  0% { transform: scale(1.4); opacity: 0; }
  30% { transform: scale(1); opacity: 1; }
  100% { transform: scale(0.9); opacity: 0.8; }
}

/* ============================================================
   Focus Reticle
   ============================================================ */
.focus-reticle {
  position: fixed;
  width: 80px; height: 80px;
  border: 2px solid var(--amber);
  z-index: 10;
  pointer-events: none;
  opacity: 0;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 12px rgba(232,168,64,0.3);
}
.focus-reticle.active {
  animation: focus-pop 0.8s ease-out forwards;
}
.focus-reticle::before,
.focus-reticle::after {
  content: '';
  position: absolute;
  background: var(--amber);
}
.focus-reticle::before {
  top: 50%; left: -6px; right: -6px; height: 1px;
  transform: translateY(-50%);
}
.focus-reticle::after {
  left: 50%; top: -6px; bottom: -6px; width: 1px;
  transform: translateX(-50%);
}
@keyframes focus-pop {
  0% { opacity: 1; transform: translate(-50%,-50%) scale(1.3); }
  40% { opacity: 1; transform: translate(-50%,-50%) scale(0.85); }
  100% { opacity: 0; transform: translate(-50%,-50%) scale(1); }
}

/* ============================================================
   Top Control Bar
   ============================================================ */
.top-bar {
  position: fixed;
  top: max(16px, env(safe-area-inset-top, 16px));
  left: 16px; right: 16px;
  z-index: 10;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
}

.control-chip {
  background: var(--control-bg);
  backdrop-filter: blur(var(--blur-amount));
  -webkit-backdrop-filter: blur(var(--blur-amount));
  border: 1px solid var(--control-border);
  border-radius: 24px;
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 7px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition-speed);
  white-space: nowrap;
}
.control-chip:active {
  transform: scale(0.94);
  background: rgba(184,147,90,0.15);
}
.control-chip.active {
  color: var(--amber);
  border-color: rgba(184,147,90,0.4);
  background: rgba(184,147,90,0.12);
}
.control-chip .icon {
  font-size: 15px;
  line-height: 1;
}

/* Exposure slider */
.exposure-group {
  display: flex;
  align-items: center;
  gap: 6px;
}
.exposure-slider {
  -webkit-appearance: none;
  appearance: none;
  width: 60px;
  height: 2px;
  background: var(--brass-dark);
  border-radius: 1px;
  outline: none;
  cursor: pointer;
}
.exposure-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--brass);
  border: 2px solid var(--brass-light);
  cursor: pointer;
  box-shadow: 0 0 8px rgba(184,147,90,0.3);
}
.exposure-value {
  font-size: 10px;
  color: var(--amber);
  min-width: 28px;
  text-align: center;
  letter-spacing: 0.05em;
}

/* ============================================================
   Bottom Control Bar
   ============================================================ */
.bottom-bar {
  position: fixed;
  bottom: 0;
  left: 0; right: 0;
  z-index: 10;
  padding: 16px 16px calc(16px + var(--safe-bottom));
  /* Leather texture via gradient */
  background:
    linear-gradient(0deg, rgba(10,10,10,0.95) 0%, rgba(10,10,10,0.7) 60%, transparent 100%);
}

/* Film Stock Carousel */
.film-carousel {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  padding: 0 4px 14px;
  margin-bottom: 8px;
  scrollbar-width: none;
  -ms-overflow-style: none;
  mask-image: linear-gradient(90deg, transparent 0%, black 8%, black 92%, transparent 100%);
  -webkit-mask-image: linear-gradient(90deg, transparent 0%, black 8%, black 92%, transparent 100%);
}
.film-carousel::-webkit-scrollbar { display: none; }

.film-stock {
  flex-shrink: 0;
  scroll-snap-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  opacity: 0.45;
  filter: grayscale(0.3);
}
.film-stock.active {
  opacity: 1;
  filter: grayscale(0);
}

.film-stock-preview {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 2px solid transparent;
  overflow: hidden;
  transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
}
.film-stock.active .film-stock-preview {
  border-color: var(--brass);
  box-shadow: 0 0 16px rgba(184,147,90,0.35);
  transform: scale(1.1);
}
.film-stock-preview canvas {
  width: 100%; height: 100%;
  display: block;
}
.film-stock-label {
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.1em;
  color: var(--text-secondary);
  text-align: center;
  max-width: 60px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: color 0.3s;
}
.film-stock.active .film-stock-label {
  color: var(--amber);
}

/* Shutter & Controls Row */
.controls-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 4px;
}

.gallery-thumb {
  width: 48px; height: 48px;
  border-radius: 6px;
  border: 1.5px solid rgba(184,147,90,0.25);
  overflow: hidden;
  background: var(--surface);
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
}
.gallery-thumb:active { transform: scale(0.92); }
.gallery-thumb img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.gallery-thumb .count {
  position: absolute;
  top: -4px; right: -4px;
  width: 18px; height: 18px;
  background: var(--red-accent);
  border-radius: 50%;
  font-size: 10px;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  border: 1.5px solid var(--bg);
}

/* Shutter Button */
.shutter-wrapper {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}
.shutter-outer-ring {
  width: 84px; height: 84px;
  border-radius: 50%;
  border: 3px solid rgba(184,147,90,0.35);
  position: absolute;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
.shutter-wrapper:active .shutter-outer-ring {
  transform: scale(1.12);
  border-color: var(--brass-light);
}
.shutter-btn {
  width: 66px; height: 66px;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, #d4d4d4 0%, #888 40%, #555 70%, #333 100%);
  border: 3px solid #666;
  cursor: pointer;
  position: relative;
  z-index: 2;
  transition: all 0.15s ease-out;
  box-shadow:
    0 4px 20px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.2),
    0 1px 0 rgba(255,255,255,0.05);
}
.shutter-btn:active {
  transform: scale(0.9);
  box-shadow:
    0 2px 8px rgba(0,0,0,0.6),
    inset 0 2px 4px rgba(0,0,0,0.3);
  background: radial-gradient(circle at 40% 35%, #bbb 0%, #777 40%, #444 70%, #222 100%);
}
.shutter-btn-inner {
  position: absolute;
  inset: 6px;
  border-radius: 50%;
  background: radial-gradient(circle at 45% 40%, #555 0%, #1a1a1a 100%);
  border: 1.5px solid #444;
}
.shutter-btn-center {
  position: absolute;
  inset: 14px;
  border-radius: 50%;
  background: radial-gradient(circle at 50% 45%, #333 0%, #0a0a0a 100%);
}

/* Side buttons */
.side-btn {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: var(--control-bg);
  backdrop-filter: blur(var(--blur-amount));
  -webkit-backdrop-filter: blur(var(--blur-amount));
  border: 1px solid var(--control-border);
  color: var(--text-secondary);
  font-size: 17px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.3s;
}
.side-btn:active {
  transform: scale(0.88);
  color: var(--amber);
  border-color: rgba(184,147,90,0.35);
}

/* ============================================================
   Gallery Modal
   ============================================================ */
.gallery-overlay {
  position: fixed;
  inset: 0;
  z-index: 30;
  background: rgba(10,10,10,0.97);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  display: flex;
  flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
}
.gallery-overlay.open {
  transform: translateY(0);
}

.gallery-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 20px 12px;
  padding-top: max(20px, env(safe-area-inset-top, 20px));
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.gallery-title {
  font-family: var(--font-display);
  font-size: 22px;
  color: var(--text-primary);
  letter-spacing: 0.02em;
}
.gallery-actions {
  display: flex;
  gap: 10px;
}
.gallery-action-btn {
  padding: 10px 18px;
  border-radius: 20px;
  background: var(--control-bg);
  border: 1px solid var(--control-border);
  color: var(--text-secondary);
  font-family: var(--font-mono);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.3s;
  letter-spacing: 0.05em;
}
.gallery-action-btn:active {
  background: rgba(184,147,90,0.15);
  color: var(--amber);
}
.gallery-action-btn.export {
  background: rgba(184,147,90,0.15);
  border-color: rgba(184,147,90,0.35);
  color: var(--brass-light);
}

.gallery-grid {
  flex: 1;
  overflow-y: auto;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 3px;
  padding: 3px;
}
.gallery-item {
  aspect-ratio: 3/4;
  background: var(--surface);
  cursor: pointer;
  overflow: hidden;
  position: relative;
  transition: transform 0.2s;
}
.gallery-item:active { transform: scale(0.96); }
.gallery-item img {
  width: 100%; height: 100%;
  object-fit: cover;
}
.gallery-item .date-stamp {
  position: absolute;
  bottom: 4px; right: 4px;
  font-family: var(--font-mono);
  font-size: 7px;
  color: rgba(255,255,255,0.5);
  text-shadow: 0 1px 2px rgba(0,0,0,0.8);
  letter-spacing: 0.05em;
}
.gallery-empty {
  grid-column: 1 / -1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  color: var(--text-dim);
  text-align: center;
  gap: 12px;
}
.gallery-empty .icon {
  font-size: 48px;
  opacity: 0.3;
}

/* Fullscreen photo view */
.photo-viewer {
  position: fixed;
  inset: 0;
  z-index: 35;
  background: rgba(5,5,5,0.98);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.photo-viewer.open {
  opacity: 1;
  pointer-events: auto;
}
.photo-viewer img {
  max-width: 92%;
  max-height: 70vh;
  object-fit: contain;
  border: 12px solid #f5f0e8;
  box-shadow:
    0 8px 40px rgba(0,0,0,0.6),
    0 2px 6px rgba(0,0,0,0.3),
    inset 0 0 0 1px rgba(0,0,0,0.05);
}
.photo-viewer-footer {
  margin-top: 20px;
  display: flex;
  gap: 12px;
  align-items: center;
}
.photo-viewer-footer button {
  padding: 12px 24px;
  border-radius: 24px;
  background: var(--control-bg);
  border: 1px solid var(--control-border);
  color: var(--text-secondary);
  font-family: var(--font-mono);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.3s;
  letter-spacing: 0.05em;
}
.photo-viewer-footer button:active {
  background: rgba(184,147,90,0.15);
  color: var(--amber);
}
.photo-viewer-close {
  position: absolute;
  top: max(20px, env(safe-area-inset-top, 20px));
  right: 20px;
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--control-bg);
  border: 1px solid var(--control-border);
  color: var(--text-secondary);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
}
.photo-viewer-close:active { color: #fff; }

/* ============================================================
   Toast Messages
   ============================================================ */
.toast {
  position: fixed;
  bottom: 140px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  z-index: 40;
  background: rgba(20,18,14,0.9);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(184,147,90,0.25);
  border-radius: 20px;
  padding: 10px 20px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--brass-light);
  letter-spacing: 0.06em;
  opacity: 0;
  pointer-events: none;
  transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ============================================================
   Camera permission prompt
   ============================================================ */
.camera-prompt {
  position: fixed;
  inset: 0;
  z-index: 25;
  background: rgba(5,5,5,0.9);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s;
}
.camera-prompt.show {
  opacity: 1;
  pointer-events: auto;
}
.camera-prompt-card {
  background: var(--surface);
  border: 1px solid rgba(184,147,90,0.2);
  border-radius: 16px;
  padding: 32px 24px;
  text-align: center;
  max-width: 300px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.camera-prompt-card .icon {
  font-size: 40px;
}
.camera-prompt-card p {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.5;
  letter-spacing: 0.03em;
}
.camera-prompt-card button {
  padding: 14px 28px;
  border-radius: 24px;
  background: var(--brass-dark);
  border: none;
  color: #fff;
  font-family: var(--font-mono);
  font-size: 13px;
  cursor: pointer;
  letter-spacing: 0.08em;
  transition: all 0.3s;
}
.camera-prompt-card button:active {
  background: var(--brass);
  transform: scale(0.96);
}

/* ============================================================
   Responsive adjustments
   ============================================================ */
@media (min-width: 768px) {
  .bottom-bar {
    max-width: 480px;
    left: 50%;
    transform: translateX(-50%);
    border-radius: 24px 24px 0 0;
  }
  .top-bar {
    max-width: 480px;
    left: 50%;
    transform: translateX(-50%);
  }
  .film-carousel {
    justify-content: center;
  }
}

@media (min-width: 1024px) {
  .viewfinder canvas {
    max-width: 500px;
    margin: 0 auto;
    left: 50%;
    position: relative;
    transform: translateX(-50%);
  }
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>

<!-- ============================================================
     Viewfinder
     ============================================================ -->
<div class="viewfinder" id="viewfinder">
  <canvas id="viewfinderCanvas"></canvas>
  <div class="viewfinder-info" id="viewfinderInfo">
    <span class="dot"></span>
    <span id="filmNameDisplay">PORTRA 400</span>

<!-- ============================================================

<script>
(function() {

  const FILM_STOCKS = [

    },
    {
      id: 'polaroid',
      name: 'Polaroid',
      maker: 'POLAROID',
      iso: '640',
      cssFilter: 'sepia(0.18) saturate(0.65) contrast(0.85) brightness(1.12) hue-rotate(-3deg)',
      grain: { intensity: 0.3, size: 1.4, roughness: 0.6 },
      vignette: { intensity: 0.3, roundness: 0.7 },
      lightLeak: { intensity: 0.05, angle: 200, color: [255, 230, 190] },
      scanlines: false,
      dust: true,
      scratches: false,
      halation: false,
      colorShift: [1.05, 0.96, 0.88],
      contrast: 0.85,
      saturation: 0.65
    },
    {
      id: 'expired',
      name: 'Expired Film',
      maker: 'EXPIRED',
      iso: '800',
      cssFilter: 'sepia(0.35) saturate(0.7) contrast(0.82) brightness(0.9) hue-rotate(25deg)',
      grain: { intensity: 0.8, size: 2.5, roughness: 1.0 },
      vignette: { intensity: 0.5, roundness: 0.55 },
      lightLeak: { intensity: 0.18, angle: 90, color: [255, 140, 30] },
      scanlines: true,
      dust: true,
      scratches: true,
      halation: false,
      colorShift: [1.1, 0.88, 0.78],
      contrast: 0.82,
      saturation: 0.7
    },
    {
      id: 'cinestill800t',
      name: 'Cinestill 800T',
      maker: 'CINESTILL',
      iso: '800',
      cssFilter: 'saturate(0.8) contrast(1.18) brightness(0.88) hue-rotate(-18deg)',
      grain: { intensity: 0.35, size: 1.3, roughness: 0.55 },
      vignette: { intensity: 0.28, roundness: 0.5 },
      lightLeak: { intensity: 0.04, angle: 270, color: [255, 100, 60] },
      scanlines: true,
      dust: true,
      scratches: false,
      halation: true,
      colorShift: [0.85, 0.92, 1.08],
      contrast: 1.18,
      saturation: 0.8
    }
  ];

  // ============================================================
  // App State
  // ============================================================
  const state = {
    currentFilmIdx: 0,
    flashMode: 0,        // 0=off, 1=on, 2=auto
    timerMode: 0,        // 0=off, 3=3s, 10=10s
    exposureEV: 0,       // -4 to +4
    facingMode: 'environment', // 'user' | 'environment'
    isCapturing: false,
    isTimerRunning: false,
    gallery: [],         // [{ dataURL, filmId, date }]
    selectedPhotos: new Set(),
    videoStream: null,
    animFrameId: null,
    grainCanvas: null,
    grainCtx: null,
    grainFrame: 0,
    focusTimeout: null,
    currentFilm: FILM_STOCKS[0]
  };

  // ============================================================
  // DOM References
  // ============================================================
  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => document.querySelectorAll(sel);

  const dom = {
    viewfinderCanvas: $('#viewfinderCanvas'),
    viewfinderInfo: $('#viewfinderInfo'),
    filmNameDisplay: $('#filmNameDisplay'),
    filmIsoDisplay: $('#filmIsoDisplay'),
    fxScanlines: $('#fxScanlines'),
    fxDust: $('#fxDust'),
    fxLightleak: $('#fxLightleak'),
    flashOverlay: $('#flashOverlay'),
    filmAdvance: $('#filmAdvance'),
    timerOverlay: $('#timerOverlay'),
    timerCount: $('#timerCount'),
    focusReticle: $('#focusReticle'),
    cameraPrompt: $('#cameraPrompt'),
    cameraAllowBtn: $('#cameraAllowBtn'),
    flashBtn: $('#flashBtn'),
    timerBtn: $('#timerBtn'),
    exposureSlider: $('#exposureSlider'),
    exposureValue: $('#exposureValue'),
    flipCameraBtn: $('#flipCameraBtn'),
    filmCarousel: $('#filmCarousel'),
    galleryThumb: $('#galleryThumb'),
    galleryThumbImg: $('#galleryThumbImg'),
    galleryCount: $('#galleryCount'),
    shutterBtn: $('#shutterBtn'),
    galleryOverlay: $('#galleryOverlay'),
    galleryGrid: $('#galleryGrid'),
    gallerySelectAll: $('#gallerySelectAll'),
    galleryExport: $('#galleryExport'),
    galleryCloseBtn: $('#galleryClose'),
    photoViewer: $('#photoViewer'),
    photoViewerImg: $('#photoViewerImg'),
    photoViewerClose: $('#photoViewerClose'),
    photoViewerDownload: $('#photoViewerDownload'),
    photoViewerDelete: $('#photoViewerDelete'),
    toast: $('#toast'),
    topBar: $('#topBar'),
    bottomBar: $('#bottomBar'),
    shutterWrapper: $('#shutterWrapper')
  };

  // ============================================================
  // Canvas Setup
  // ============================================================
  const vfCanvas = dom.viewfinderCanvas;
  const vfCtx = vfCanvas.getContext('2d', { alpha: false, willReadFrequently: true });

  // Offscreen canvas for grain
  const grainCanvas = document.createElement('canvas');
  grainCanvas.width = 256;
  grainCanvas.height = 256;
  const grainCtx = grainCanvas.getContext('2d');

  // Offscreen canvas for final composite
  const compositeCanvas = document.createElement('canvas');
  const compositeCtx = compositeCanvas.getContext('2d');

  function resizeCanvas() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2); // Cap for performance
    const w = window.innerWidth;
    const h = window.innerHeight;
    vfCanvas.width = w * dpr;
    vfCanvas.height = h * dpr;
    vfCanvas.style.width = w + 'px';
    vfCanvas.style.height = h + 'px';
    vfCtx.setTransform(1, 0, 0, 1, 0, 0);
    compositeCanvas.width = w * dpr;
    compositeCanvas.height = h * dpr;
    compositeCtx.setTransform(1, 0, 0, 1, 0, 0);
  }

  // ============================================================
  // Pre-generate Grain Texture
  // ============================================================
  function generateGrainTexture(intensity, size) {
    const w = grainCanvas.width;
    const h = grainCanvas.height;
    const imageData = grainCtx.createImageData(w, h);
    const data = imageData.data;

    for (let i = 0; i < data.length; i += 4) {
      // Gaussian-ish noise via Box-Muller approximation
      const u1 = Math.random();
      const u2 = Math.random();
      const gauss = Math.sqrt(-2 * Math.log(u1 || 0.001)) * Math.cos(2 * Math.PI * u2);
      const noise = Math.max(0, Math.min(255, 128 + gauss * 40 * intensity));

      data[i] = noise;
      data[i + 1] = noise;
      data[i + 2] = noise;
      data[i + 3] = 255;
    }

    grainCtx.putImageData(imageData, 0, 0);
  }

  function getGrainPattern() {
    // Shift the grain each frame by reading a random offset
    const ox = Math.floor(Math.random() * grainCanvas.width);
    const oy = Math.floor(Math.random() * grainCanvas.height);
    return { canvas: grainCanvas, ox, oy };
  }

  // ============================================================
  // Dust & Scratch Texture
  // ============================================================
  const dustCanvas = document.createElement('canvas');
  dustCanvas.width = 512;
  dustCanvas.height = 512;
  const dustCtx = dustCanvas.getContext('2d');

  function generateDustTexture(intensity) {
    dustCtx.clearRect(0, 0, 512, 512);
    const count = Math.floor(intensity * 200);

    for (let i = 0; i < count; i++) {
      const x = Math.random() * 512;
      const y = Math.random() * 512;
      const r = Math.random() * 1.5 + 0.2;
      const alpha = Math.random() * 0.15 * intensity;

      dustCtx.beginPath();
      dustCtx.arc(x, y, r, 0, Math.PI * 2);
      dustCtx.fillStyle = `rgba(255,255,255,${alpha})`;
      dustCtx.fill();

      // Occasional hair/scratch
      if (Math.random() < 0.03 * intensity) {
        const sx = x + (Math.random() - 0.5) * 30;
        const sy = y + (Math.random() - 0.5) * 3;
        dustCtx.beginPath();
        dustCtx.moveTo(x, y);
        dustCtx.lineTo(sx, sy);
        dustCtx.strokeStyle = `rgba(255,255,255,${alpha * 0.6})`;
        dustCtx.lineWidth = 0.3;
        dustCtx.stroke();
      }
    }
  }

  // ============================================================
  // Apply Film Effect to Canvas
  // ============================================================
  function applyFilmEffect(ctx, film, w, h) {
    // Vignette
    const vig = film.vignette;
    if (vig.intensity > 0) {
      const cx = w / 2;
      const cy = h / 2;
      const maxR = Math.sqrt(cx * cx + cy * cy);

      const vignetteGrad = ctx.createRadialGradient(cx, cy, maxR * (1 - vig.roundness - 0.2), cx, cy, maxR * 1.05);
      vignetteGrad.addColorStop(0, 'rgba(0,0,0,0)');
      vignetteGrad.addColorStop(0.6, `rgba(0,0,0,${vig.intensity * 0.3})`);
      vignetteGrad.addColorStop(1, `rgba(0,0,0,${vig.intensity})`);

      ctx.fillStyle = vignetteGrad;
      ctx.fillRect(0, 0, w, h);
    }

    // Grain overlay
    const grain = film.grain;
    if (grain.intensity > 0) {
      const { canvas: gc, ox, oy } = getGrainPattern();
      ctx.globalAlpha = grain.intensity * 0.45;
      ctx.globalCompositeOperation = 'overlay';

      // Tile grain across screen
      for (let x = -ox; x < w; x += grainCanvas.width) {
        for (let y = -oy; y < h; y += grainCanvas.height) {
          ctx.drawImage(gc, x, y);
        }
      }
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
    }

    // Dust overlay
    if (film.dust && film.grain.intensity > 0.2) {
      ctx.globalAlpha = film.grain.intensity * 0.2;
      ctx.globalCompositeOperation = 'screen';
      const dw = dustCanvas.width;
      const dh = dustCanvas.height;
      const dox = Math.floor(Math.random() * dw);
      const doy = Math.floor(Math.random() * dh);
      for (let x = -dox; x < w; x += dw) {
        for (let y = -doy; y < h; y += dh) {
          ctx.drawImage(dustCanvas, x, y);
        }
      }
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
    }

    // Light leak
    const ll = film.lightLeak;
    if (ll.intensity > 0.01) {
      const angleRad = (ll.angle * Math.PI) / 180;
      const gx = w / 2 + Math.cos(angleRad) * w * 0.6;
      const gy = h / 2 + Math.sin(angleRad) * h * 0.6;
      const leakGrad = ctx.createRadialGradient(gx, gy, w * 0.1, gx, gy, w * 0.9);
      const [lr, lg, lb] = ll.color;
      leakGrad.addColorStop(0, `rgba(${lr},${lg},${lb},${ll.intensity * 0.8})`);
      leakGrad.addColorStop(0.4, `rgba(${lr},${lg},${lb},${ll.intensity * 0.3})`);
      leakGrad.addColorStop(1, 'rgba(0,0,0,0)');

      ctx.fillStyle = leakGrad;
      ctx.globalCompositeOperation = 'screen';
      ctx.fillRect(0, 0, w, h);
      ctx.globalCompositeOperation = 'source-over';
    }

    // Halation (Cinestill glow around bright areas)
    if (film.halation) {
      ctx.globalCompositeOperation = 'screen';
      const halGrad = ctx.createRadialGradient(w * 0.5, h * 0.35, w * 0.05, w * 0.5, h * 0.35, w * 0.5);
      halGrad.addColorStop(0, 'rgba(255,60,30,0.12)');
      halGrad.addColorStop(0.5, 'rgba(255,30,10,0.04)');
      halGrad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = halGrad;
      ctx.fillRect(0, 0, w, h);
      ctx.globalCompositeOperation = 'source-over';
    }

    // Scan lines at the very end
    if (film.scanlines) {
      ctx.fillStyle = 'rgba(0,0,0,0.025)';
      for (let y = 0; y < h; y += 4) {
        ctx.fillRect(0, y, w, 2);
      }
    }
  }

  // ============================================================
  // Render Loop
  // ============================================================
  let videoEl = null;

  function createVideoElement() {
    if (videoEl) return videoEl;
    videoEl = document.createElement('video');
    videoEl.setAttribute('playsinline', '');
    videoEl.setAttribute('autoplay', '');
    videoEl.muted = true;
    videoEl.style.display = 'none';
    document.body.appendChild(videoEl);
    return videoEl;
  }

  async function startCamera() {
    try {
      if (state.videoStream) {
        state.videoStream.getTracks().forEach(t => t.stop());
      }

      const video = createVideoElement();
      const constraints = {
        video: {
          facingMode: state.facingMode,
          width: { ideal: 1280 },
          height: { ideal: 720 }
        },
        audio: false
      };

      state.videoStream = await navigator.mediaDevices.getUserMedia(constraints);
      video.srcObject = state.videoStream;
      await video.play();

      dom.cameraPrompt.classList.remove('show');
      return true;
    } catch (err) {
      console.warn('Camera access denied or unavailable:', err.message);
      // Fall back to demo mode
      return false;
    }
  }

  function render(timestamp) {
    state.animFrameId = requestAnimationFrame(render);

    const film = state.currentFilm;
    const w = vfCanvas.width;
    const h = vfCanvas.height;

    // Clear
    vfCtx.fillStyle = '#0a0a0a';
    vfCtx.fillRect(0, 0, w, h);

    if (videoEl && videoEl.readyState >= 2 && !videoEl.paused) {
      // Draw video frame
      const vw = videoEl.videoWidth;
      const vh = videoEl.videoHeight;

      // Cover-fit calculation
      const scale = Math.max(w / vw, h / vh);
      const sw = vw * scale;
      const sh = vh * scale;
      const sx = (w - sw) / 2;
      const sy = (h - sh) / 2;

      // Apply exposure compensation via brightness
      const brightness = 1 + state.exposureEV * 0.15;

      vfCtx.filter = `${film.cssFilter} brightness(${brightness})`;
      vfCtx.drawImage(videoEl, sx, sy, sw, sh);
      vfCtx.filter = 'none';
    } else {
      // Demo scene — darkroom gradient
      const demoGrad = vfCtx.createLinearGradient(0, 0, w, h);
      demoGrad.addColorStop(0, '#1a1a1a');
      demoGrad.addColorStop(0.3, '#222');
      demoGrad.addColorStop(0.6, '#1a1a1a');
      demoGrad.addColorStop(1, '#111');
      vfCtx.fillStyle = demoGrad;
      vfCtx.fillRect(0, 0, w, h);

      // Draw a subtle test pattern
      vfCtx.fillStyle = 'rgba(255,255,255,0.03)';
      vfCtx.fillRect(w * 0.2, h * 0.3, w * 0.6, h * 0.4);

      // Apply film CSS filter to the whole canvas
      const imageData = vfCtx.getImageData(0, 0, w, h);
      vfCtx.putImageData(imageData, 0, 0);

      // Simulate film color shift
      vfCtx.fillStyle = `rgba(${Math.round(255*film.colorShift[0] - 255)},${Math.round(255*film.colorShift[1] - 255)},${Math.round(255*film.colorShift[2] - 255)},0.08)`;
      vfCtx.fillRect(0, 0, w, h);
    }

    // Apply film effects (grain, vignette, light leaks, etc.)
    applyFilmEffect(vfCtx, film, w, h);
  }

  // ============================================================
  // Capture Photo
  // ============================================================
  function capturePhoto() {
    const film = state.currentFilm;
    const w = vfCanvas.width;
    const h = vfCanvas.height;

    // Render final frame to composite canvas with film border
    const borderW = Math.floor(w * 0.04);
    const photoW = w - borderW * 2;
    const photoH = h - borderW * 2;
    const totalH = photoH + borderW * 3 + 60; // extra space for border + date strip

    compositeCanvas.width = photoW + borderW * 2;
    compositeCanvas.height = photoH + borderW * 2;

    // White border (Polaroid-style for some films, subtle for others)
    if (film.id === 'polaroid') {
      compositeCtx.fillStyle = '#f8f4ec';
      compositeCtx.fillRect(0, 0, compositeCanvas.width, compositeCanvas.height + 60);
      compositeCtx.drawImage(vfCanvas, 0, 0, w, h,
        borderW, borderW, photoW, photoH);

      // Date stamp
      const now = new Date();
      const dateStr = now.toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' });
      compositeCtx.fillStyle = '#666';
      compositeCtx.font = `${Math.max(12, photoW * 0.03)}px "Courier Prime", monospace`;
      compositeCtx.textAlign = 'center';
      compositeCtx.fillText(`POLAROID • ${dateStr}`, compositeCanvas.width / 2, compositeCanvas.height + 40);
    } else {
      // Standard film border
      compositeCtx.fillStyle = '#111';
      compositeCtx.fillRect(0, 0, compositeCanvas.width, compositeCanvas.height);

      // Draw captured frame
      compositeCtx.drawImage(vfCanvas, 0, 0, w, h,
        borderW / 2, borderW / 2, photoW + borderW, photoH + borderW);

      // Subtle inner border
      compositeCtx.strokeStyle = 'rgba(255,255,255,0.15)';
      compositeCtx.lineWidth = 1;
      compositeCtx.strokeRect(borderW / 2, borderW / 2, photoW + borderW, photoH + borderW);

      // Film rebate markings
      compositeCtx.fillStyle = 'rgba(255,180,60,0.3)';
      compositeCtx.font = `${Math.max(10, photoW * 0.025)}px "Courier Prime", monospace`;
      compositeCtx.fillText(`${film.maker} ${film.name} • ${film.iso}`, borderW / 2 + 8, borderW / 2 - 4);
    }

    const dataURL = compositeCanvas.toDataURL('image/jpeg', 0.92);

    // Add to gallery
    state.gallery.unshift({
      dataURL,
      filmId: film.id,
      filmName: film.name,
      date: new Date().toISOString(),
      thumbnailDataURL: createThumbnail(dataURL)
    });

    updateGalleryThumb();
    updateGalleryGrid();
  }

  function createThumbnail(dataURL) {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = () => {
        const thumbCanvas = document.createElement('canvas');
        const size = 200;
        thumbCanvas.width = size;
        thumbCanvas.height = size;
        const tCtx = thumbCanvas.getContext('2d');
        const scale = Math.min(size / img.width, size / img.height);
        const sw = img.width * scale;
        const sh = img.height * scale;
        tCtx.drawImage(img, (size - sw) / 2, (size - sh) / 2, sw, sh);
        resolve(thumbCanvas.toDataURL('image/jpeg', 0.7));
      };
      img.src = dataURL;
    });
  }

  // ============================================================
  // Shutter Action
  // ============================================================
  function fireShutter() {
    if (state.isCapturing) return;
    state.isCapturing = true;

    // Flash overlay
    dom.flashOverlay.classList.add('fire');
    setTimeout(() => dom.flashOverlay.classList.remove('fire'), 80);

    // Play shutter sound
    playShutterSound();

    // Haptic feedback
    if (navigator.vibrate) {
      navigator.vibrate([15, 30, 10]);
    }

    // Capture
    capturePhoto();

    // Film advance animation
    setTimeout(() => {
      playFilmAdvance();
    }, 200);

    // Toast
    showToast(`已拍摄 • ${state.currentFilm.name}`);

    setTimeout(() => {
      state.isCapturing = false;
    }, 600);
  }

  function startTimer(count) {
    if (state.isTimerRunning) return;
    state.isTimerRunning = true;

    let remaining = count;
    dom.timerOverlay.classList.add('active');

    // Beep sound context
    const audioCtx = getAudioContext();

    function tick() {
      if (remaining <= 0) {
        dom.timerOverlay.classList.remove('active');
        dom.timerCount.textContent = '';
        state.isTimerRunning = false;
        fireShutter();
        return;
      }

      dom.timerCount.textContent = remaining;
      dom.timerCount.style.animation = 'none';
      void dom.timerCount.offsetWidth;
      dom.timerCount.style.animation = 'timer-pulse 1s ease-out forwards';

      // Beep
      playBeep(audioCtx, remaining <= 3 ? 880 : 440, 0.12);

      remaining--;
      setTimeout(tick, 1000);
    }

    tick();
  }

  // ============================================================
  // Audio Synthesis
  // ============================================================
  let audioCtx = null;
  function getAudioContext() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioCtx;
  }

  function playShutterSound() {
    try {
      const ctx = getAudioContext();
      const now = ctx.currentTime;

      // Mechanical thump — low frequency
      const osc1 = ctx.createOscillator();
      const gain1 = ctx.createGain();
      osc1.type = 'sine';
      osc1.frequency.setValueAtTime(80, now);
      osc1.frequency.exponentialRampToValueAtTime(40, now + 0.08);
      gain1.gain.setValueAtTime(0.5, now);
      gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      osc1.connect(gain1);
      gain1.connect(ctx.destination);
      osc1.start(now);
      osc1.stop(now + 0.1);

      // Click/Clack — high frequency
      const osc2 = ctx.createOscillator();
      const gain2 = ctx.createGain();
      osc2.type = 'square';
      osc2.frequency.setValueAtTime(1200, now);
      osc2.frequency.exponentialRampToValueAtTime(600, now + 0.04);
      gain2.gain.setValueAtTime(0.2, now);
      gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
      osc2.connect(gain2);
      gain2.connect(ctx.destination);
      osc2.start(now);
      osc2.stop(now + 0.06);

      // Mirror slap — mid
      const osc3 = ctx.createOscillator();
      const gain3 = ctx.createGain();
      osc3.type = 'triangle';
      osc3.frequency.setValueAtTime(200, now + 0.04);
      osc3.frequency.exponentialRampToValueAtTime(60, now + 0.12);
      gain3.gain.setValueAtTime(0.25, now + 0.04);
      gain3.gain.exponentialRampToValueAtTime(0.001, now + 0.14);
      osc3.connect(gain3);
      gain3.connect(ctx.destination);
      osc3.start(now + 0.04);
      osc3.stop(now + 0.14);

      // Noise burst — mechanical texture
      const bufferSize = ctx.sampleRate * 0.06;
      const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const noiseData = noiseBuffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        noiseData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.3));
      }
      const noiseSource = ctx.createBufferSource();
      const noiseGain = ctx.createGain();
      noiseSource.buffer = noiseBuffer;
      noiseGain.gain.setValueAtTime(0.15, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
      noiseSource.connect(noiseGain);
      noiseGain.connect(ctx.destination);
      noiseSource.start(now);
    } catch (e) {
      // Audio not available
    }
  }

  function playBeep(ctx, freq, duration) {
    try {
      const now = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now);
      osc.stop(now + duration);
    } catch (e) { /* ignore */ }
  }

  // ============================================================
  // Film Advance Animation
  // ============================================================
  function playFilmAdvance() {
    const el = dom.filmAdvance;
    el.classList.add('running');

    // Play film advance sound
    try {
      const ctx = getAudioContext();
      const now = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(30, now);
      osc.frequency.linearRampToValueAtTime(60, now + 0.3);
      osc.frequency.linearRampToValueAtTime(20, now + 0.6);
      gain.gain.setValueAtTime(0.08, now);
      gain.gain.setValueAtTime(0.08, now + 0.55);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.65);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.65);
    } catch (e) { /* ignore */ }

    setTimeout(() => {
      el.classList.remove('running');
    }, 650);
  }

  // ============================================================
  // Focus Animation
  // ============================================================
  function showFocusReticle(x, y) {
    const reticle = dom.focusReticle;
    reticle.style.left = x + 'px';
    reticle.style.top = y + 'px';
    reticle.classList.remove('active');
    void reticle.offsetWidth;
    reticle.classList.add('active');

    clearTimeout(state.focusTimeout);
    state.focusTimeout = setTimeout(() => {
      reticle.classList.remove('active');
    }, 9000);
  }

  // ============================================================
  // Toast
  // ============================================================
  let toastTimeout;
  function showToast(message) {
    clearTimeout(toastTimeout);
    dom.toast.textContent = message;
    dom.toast.classList.add('show');
    toastTimeout = setTimeout(() => {
      dom.toast.classList.remove('show');
    }, 2000);
  }

  // ============================================================
  // Gallery Management
  // ============================================================
  function updateGalleryThumb() {
    if (state.gallery.length > 0) {
      const latest = state.gallery[0];
      latest.thumbnailDataURL.then(tn => {
        dom.galleryThumbImg.src = tn;
        dom.galleryThumbImg.style.display = 'block';
      });
      dom.galleryCount.textContent = state.gallery.length;
      dom.galleryCount.style.display = 'flex';
    } else {
      dom.galleryThumbImg.style.display = 'none';
      dom.galleryCount.style.display = 'none';
    }
  }

  function updateGalleryGrid() {
    const grid = dom.galleryGrid;

    if (state.gallery.length === 0) {
      grid.innerHTML = `
        <div class="gallery-empty">
          <span class="icon">🎞️</span>
          <p>尚无照片<br>按下快门开始拍摄</p>
        </div>`;
      return;
    }

    let html = '';
    state.gallery.forEach((photo, idx) => {
      const date = new Date(photo.date);
      const dateStr = date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
      const thumbSrc = photo.thumbnailDataURL.then ? '' : photo.thumbnailDataURL;
      html += `
        <div class="gallery-item" data-idx="${idx}" data-selected="${state.selectedPhotos.has(idx)}">
          <img src="${photo.dataURL}" alt="" loading="lazy" style="width:100%;height:100%;object-fit:cover;">
          <span class="date-stamp">${dateStr}</span>
        </div>`;
    });

    grid.innerHTML = html;

    // Add click handlers
    grid.querySelectorAll('.gallery-item').forEach(item => {
      item.addEventListener('click', (e) => {
        const idx = parseInt(item.dataset.idx);
        if (e.shiftKey || state.selectedPhotos.size > 0) {
          // Multi-select mode
          togglePhotoSelection(idx, item);
        } else {
          // View photo
          viewPhoto(idx);
        }
      });
    });
  }

  function togglePhotoSelection(idx, el) {
    if (state.selectedPhotos.has(idx)) {
      state.selectedPhotos.delete(idx);
      el.dataset.selected = 'false';
      el.style.outline = 'none';
    } else {
      state.selectedPhotos.add(idx);
      el.dataset.selected = 'true';
      el.style.outline = '2px solid var(--brass)';
      el.style.outlineOffset = '-2px';
    }
    updateSelectionUI();
  }

  function updateSelectionUI() {
    dom.gallerySelectAll.textContent =
      state.selectedPhotos.size === state.gallery.length ? '取消全选' : '全选';
  }

  function viewPhoto(idx) {
    const photo = state.gallery[idx];
    if (!photo) return;

    dom.photoViewerImg.src = photo.dataURL;
    dom.photoViewer.classList.add('open');
    dom.photoViewer.dataset.currentIdx = idx;
  }

  function closePhotoViewer() {
    dom.photoViewer.classList.remove('open');
  }

  function downloadPhoto(dataURL, filename) {
    const link = document.createElement('a');
    link.download = filename || `film_${Date.now()}.jpg`;
    link.href = dataURL;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }

  function exportSelected() {
    if (state.selectedPhotos.size === 0) {
      showToast('请先选择要导出的照片');
      return;
    }

    const indices = Array.from(state.selectedPhotos).sort((a, b) => a - b);
    indices.forEach((idx, i) => {
      const photo = state.gallery[idx];
      setTimeout(() => {
        downloadPhoto(photo.dataURL, `film_${photo.filmId}_${i + 1}.jpg`);
      }, i * 200);
    });

    showToast(`正在导出 ${indices.length} 张照片`);
    state.selectedPhotos.clear();
    updateGalleryGrid();
  }

  // ============================================================
  // Film Carousel
  // ============================================================
  function buildFilmCarousel() {
    let html = '';
    FILM_STOCKS.forEach((film, idx) => {
      html += `
        <div class="film-stock ${idx === state.currentFilmIdx ? 'active' : ''}" data-film-idx="${idx}">
          <div class="film-stock-preview">
            <canvas width="44" height="44" data-film-preview="${film.id}"></canvas>
          </div>
          <span class="film-stock-label">${film.name}</span>
        </div>`;
    });
    dom.filmCarousel.innerHTML = html;

    // Draw film stock preview swatches
    dom.filmCarousel.querySelectorAll('.film-stock-preview canvas').forEach(canvas => {
      const filmId = canvas.dataset.filmPreview;
      const film = FILM_STOCKS.find(f => f.id === filmId);
      if (!film) return;
      const pctx = canvas.getContext('2d');

      // Mini color swatch gradient
      const grad = pctx.createLinearGradient(0, 0, 44, 44);
      if (film.id === 'tri-x400') {
        grad.addColorStop(0, '#333');
        grad.addColorStop(0.5, '#666');
        grad.addColorStop(1, '#111');
      } else if (film.id === 'polaroid') {
        grad.addColorStop(0, '#e8d5c0');
        grad.addColorStop(0.5, '#f0e4d5');
        grad.addColorStop(1, '#d4c0a8');
      } else if (film.id === 'cinestill800t') {
        grad.addColorStop(0, '#1a2a4a');
        grad.addColorStop(0.5, '#2a3a5a');
        grad.addColorStop(1, '#0a1a3a');
      } else if (film.id === 'expired') {
        grad.addColorStop(0, '#6a4a2a');
        grad.addColorStop(0.5, '#8a6a4a');
        grad.addColorStop(1, '#4a2a0a');
      } else if (film.id === 'velvia50') {
        grad.addColorStop(0, '#2a6a2a');
        grad.addColorStop(0.5, '#4a8a4a');
        grad.addColorStop(1, '#1a4a1a');
      } else if (film.id === 'superia400') {
        grad.addColorStop(0, '#2a4a5a');
        grad.addColorStop(0.5, '#3a5a6a');
        grad.addColorStop(1, '#1a3a4a');
      } else {
        // Portra 400 (warm)
        grad.addColorStop(0, '#8a6a4a');
        grad.addColorStop(0.5, '#aa8a6a');
        grad.addColorStop(1, '#6a4a2a');
      }
      pctx.fillStyle = grad;
      pctx.fillRect(0, 0, 44, 44);

      // Film stock initial letter
      pctx.fillStyle = 'rgba(255,255,255,0.7)';
      pctx.font = 'bold 16px "Courier Prime", monospace';
      pctx.textAlign = 'center';
      pctx.textBaseline = 'middle';
      pctx.fillText(film.name.charAt(0), 22, 22);
    });

    // Click handlers
    dom.filmCarousel.querySelectorAll('.film-stock').forEach(stock => {
      stock.addEventListener('click', () => {
        const idx = parseInt(stock.dataset.filmIdx);
        switchFilm(idx);
      });
    });
  }

  function switchFilm(idx) {
    state.currentFilmIdx = idx;
    state.currentFilm = FILM_STOCKS[idx];

    // Update carousel UI
    dom.filmCarousel.querySelectorAll('.film-stock').forEach((s, i) => {
      s.classList.toggle('active', i === idx);
    });

    // Scroll carousel to active film
    const activeStock = dom.filmCarousel.querySelector('.film-stock.active');
    if (activeStock) {
      activeStock.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }

    // Update viewfinder info
    dom.filmNameDisplay.textContent = state.currentFilm.name.toUpperCase();
    dom.filmIsoDisplay.textContent = `ISO ${state.currentFilm.iso}`;

    // Update effects
    updateFilmEffects();

    // Regenerate grain
    generateGrainTexture(state.currentFilm.grain.intensity, state.currentFilm.grain.size);
    generateDustTexture(state.currentFilm.grain.intensity);

    // Show toast
    showToast(`${state.currentFilm.maker} ${state.currentFilm.name}`);
  }

  function updateFilmEffects() {
    const film = state.currentFilm;

    dom.fxScanlines.classList.toggle('active', film.scanlines);
    dom.fxDust.classList.toggle('active', film.dust);
    dom.fxLightleak.classList.toggle('active', film.lightLeak.intensity > 0.05);

    // Update light leak overlay color
    if (film.lightLeak.intensity > 0.05) {
      const [r, g, b] = film.lightLeak.color;
      dom.fxLightleak.style.background = `linear-gradient(${film.lightLeak.angle}deg, rgba(${r},${g},${b},${film.lightLeak.intensity * 0.7}) 0%, transparent 40%, rgba(${r},${g},${b},${film.lightLeak.intensity * 0.3}) 80%, transparent 100%)`;
    }
  }

  // ============================================================
  // UI Control Handlers
  // ============================================================
  function cycleFlash() {
    state.flashMode = (state.flashMode + 1) % 3;
    const labels = ['关', '开', '自动'];
    const icons = ['⚡', '💡', '⚡'];
    dom.flashBtn.querySelector('span:last-child').textContent = labels[state.flashMode];
    dom.flashBtn.querySelector('.icon').textContent = icons[state.flashMode];
    dom.flashBtn.classList.toggle('active', state.flashMode !== 0);

    if (state.flashMode === 1) {
      showToast('闪光灯：开启');
    } else if (state.flashMode === 2) {
      showToast('闪光灯：自动');
    }
  }

  function cycleTimer() {
    const modes = [0, 3, 10];
    const currentIdx = modes.indexOf(state.timerMode);
    const nextIdx = (currentIdx + 1) % modes.length;
    state.timerMode = modes[nextIdx];

    const labels = ['关', '3秒', '10秒'];
    dom.timerBtn.querySelector('span:last-child').textContent = labels[nextIdx];
    dom.timerBtn.classList.toggle('active', state.timerMode !== 0);

    if (state.timerMode > 0) {
      showToast(`定时拍摄：${state.timerMode}秒`);
    }
  }

  function updateExposure(value) {
    state.exposureEV = parseInt(value);
    const sign = state.exposureEV >= 0 ? '+' : '';
    dom.exposureValue.textContent = `${sign}${state.exposureEV}`;
    dom.exposureSlider.value = state.exposureEV;
  }

  async function flipCamera() {
    state.facingMode = state.facingMode === 'user' ? 'environment' : 'user';
    const success = await startCamera();
    if (success) {
      showToast(state.facingMode === 'user' ? '前置摄像头' : '后置摄像头');
    }
  }

  function openGallery() {
    dom.galleryOverlay.classList.add('open');
    state.selectedPhotos.clear();
    updateGalleryGrid();
  }

  function closeGallery() {
    dom.galleryOverlay.classList.remove('open');
    state.selectedPhotos.clear();
  }

  // ============================================================
  // Event Listeners
  // ============================================================
  function setupEventListeners() {
    // Camera permission
    dom.cameraAllowBtn.addEventListener('click', async () => {
      const success = await startCamera();
      if (!success) {
        dom.cameraPrompt.classList.remove('show');
        showToast('演示模式（无摄像头权限）');
      }
    });

    // Shutter button
    dom.shutterBtn.addEventListener('click', (e) => {
      e.preventDefault();
      if (state.isCapturing || state.isTimerRunning) return;

      if (state.timerMode > 0) {
        startTimer(state.timerMode);
      } else {
        fireShutter();
      }
    });

    // Touch on viewfinder for focus
    dom.viewfinderCanvas.addEventListener('click', (e) => {
      if (e.target.closest('.bottom-bar') || e.target.closest('.top-bar')) return;
      showFocusReticle(e.clientX, e.clientY);
    });

    // Flash button
    dom.flashBtn.addEventListener('click', cycleFlash);

    // Timer button
    dom.timerBtn.addEventListener('click', cycleTimer);

    // Exposure slider
    dom.exposureSlider.addEventListener('input', (e) => {
      updateExposure(e.target.value);
    });

    // Camera flip
    dom.flipCameraBtn.addEventListener('click', flipCamera);

    // Gallery
    dom.galleryThumb.addEventListener('click', openGallery);
    dom.galleryCloseBtn.addEventListener('click', closeGallery);

    // Gallery select all
    dom.gallerySelectAll.addEventListener('click', () => {
      if (state.selectedPhotos.size === state.gallery.length) {
        state.selectedPhotos.clear();
      } else {
        state.gallery.forEach((_, i) => state.selectedPhotos.add(i));
      }
      updateGalleryGrid();
    });

    // Gallery export
    dom.galleryExport.addEventListener('click', exportSelected);

    // Photo viewer
    dom.photoViewerClose.addEventListener('click', closePhotoViewer);
    dom.photoViewerDownload.addEventListener('click', () => {
      const idx = parseInt(dom.photoViewer.dataset.currentIdx);
      const photo = state.gallery[idx];
      if (photo) {
        downloadPhoto(photo.dataURL, `film_${photo.filmId}_${Date.now()}.jpg`);
        showToast('已下载');
      }
    });
    dom.photoViewerDelete.addEventListener('click', () => {
      const idx = parseInt(dom.photoViewer.dataset.currentIdx);
      if (idx >= 0 && idx < state.gallery.length) {
        state.gallery.splice(idx, 1);
        closePhotoViewer();
        updateGalleryThumb();
        updateGalleryGrid();
        showToast('已删除');
      }
    });

    // Swipe down on photo viewer to close
    dom.photoViewer.addEventListener('click', (e) => {
      if (e.target === dom.photoViewer) {
        closePhotoViewer();
      }
    });

    // Swipe down on gallery to close (simplified)
    dom.galleryOverlay.addEventListener('click', (e) => {
      if (e.target === dom.galleryOverlay) {
        closeGallery();
      }
    });

    // Resize handler
    let resizeDebounce;
    window.addEventListener('resize', () => {
      clearTimeout(resizeDebounce);
      resizeDebounce = setTimeout(() => {
        resizeCanvas();
        generateGrainTexture(state.currentFilm.grain.intensity, state.currentFilm.grain.size);
        generateDustTexture(state.currentFilm.grain.intensity);
      }, 250);
    });

    // Keyboard shortcuts
    window.addEventListener('keydown', (e) => {
      switch (e.key.toLowerCase()) {
        case ' ':
          e.preventDefault();
          if (!state.isCapturing && !state.isTimerRunning) fireShutter();
          break;
        case 'f':
          if (!e.ctrlKey && !e.metaKey) cycleFlash();
          break;
        case 't':
          if (!e.ctrlKey && !e.metaKey) cycleTimer();
          break;
        case 'arrowleft':
          if (!e.ctrlKey && !e.metaKey && state.currentFilmIdx > 0) {
            switchFilm(state.currentFilmIdx - 1);
          }
          break;
        case 'arrowright':
          if (!e.ctrlKey && !e.metaKey && state.currentFilmIdx < FILM_STOCKS.length - 1) {
            switchFilm(state.currentFilmIdx + 1);
          }
          break;
        case 'g':
          if (!e.ctrlKey && !e.metaKey) {
            dom.galleryOverlay.classList.contains('open') ? closeGallery() : openGallery();
          }
          break;
        case 'escape':
          closeGallery();
          closePhotoViewer();
          break;
      }
    });
  }

  // ============================================================
  // Initialize
  // ============================================================
  async function init() {
    resizeCanvas();

    // Initialize grain
    generateGrainTexture(state.currentFilm.grain.intensity, state.currentFilm.grain.size);
    generateDustTexture(state.currentFilm.grain.intensity);

    // Build film carousel
    buildFilmCarousel();

    // Update effects
    updateFilmEffects();

    // Setup event listeners
    setupEventListeners();

    // Try to start camera
    const cameraAvailable = await startCamera();
    if (!cameraAvailable) {
      // Will show camera prompt since it has class "show" by default
      // Actually wait a moment — the prompt starts visible, let's keep it that way
      showToast('请授予摄像头权限以获得最佳体验');
    } else {
      dom.cameraPrompt.classList.remove('show');
    }

    // Update gallery UI
    updateGalleryThumb();
    updateGalleryGrid();

    // Start render loop
    state.animFrameId = requestAnimationFrame(render);

    console.log('📷 FILM Camera initialized');
    console.log('   Space = shutter | F = flash | T = timer');
    console.log('   ← → = switch film | G = gallery | Esc = close');
    console.log('   Tap viewfinder = focus');
  }

  // ============================================================
  // Cleanup
  // ============================================================
  window.addEventListener('beforeunload', () => {
    if (state.animFrameId) cancelAnimationFrame(state.animFrameId);
    if (state.videoStream) {
      state.videoStream.getTracks().forEach(t => t.stop());
    }
  });

  // Start app
  init().catch(err => {
    console.error('Failed to initialize FILM camera:', err);
  });
